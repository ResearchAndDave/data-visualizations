<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pitch Report -- Soccer Injury Field Analysis</title>
<style>
/* -- Design Tokens -- */
:root {
  /* Accent — dynamically represents worst surface */
  --accent: hsl(7, 55%, 42%);
  --accent-light: hsl(7, 55%, 65%);
  --accent-bg: hsl(7, 30%, 96%);

  /* Neutrals — warm-tinted grays */
  --neutral-900: hsl(30, 10%, 10%);
  --neutral-600: hsl(30, 5%, 40%);
  --neutral-400: hsl(30, 5%, 55%);
  --neutral-bar: hsl(30, 5%, 40%);
  --neutral-bar-light: hsl(30, 5%, 65%);
  --neutral-200: hsl(30, 12%, 88%);
  --neutral-100: hsl(30, 15%, 92%);
  --neutral-50: hsl(30, 25%, 98%);
  --bg: hsl(30, 25%, 98%);
  --white: hsl(0, 0%, 100%);
  --border: hsl(30, 10%, 85%);
  --border-light: hsl(30, 10%, 92%);

  /* Source banners */
  --banner-synthetic-bg: hsl(45, 100%, 93%);
  --banner-synthetic-border: hsl(45, 80%, 70%);
  --banner-synthetic-text: hsl(45, 90%, 30%);
  --banner-real-bg: hsl(30, 15%, 95%);
  --banner-real-border: hsl(30, 10%, 88%);
  --banner-real-text: hsl(30, 10%, 25%);
}

/* -- Reset and Base -- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Georgia, 'Times New Roman', serif;
  background: var(--bg);
  color: var(--neutral-900);
  min-height: 100vh;
  font-size: 16px;
  line-height: 1.75;
}

/* -- Typography -- */
.ui { font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; }
h1 { font-size: 36px; font-weight: 700; line-height: 1.15; letter-spacing: -0.02em; }
h2 { font-size: 20px; font-weight: 700; line-height: 1.2; }
h3 { font-size: 18px; font-weight: 700; line-height: 1.2; }

/* -- Layout -- */
.container { max-width: 960px; margin: 0 auto; padding: 0 24px; }

/* -- Masthead -- */
.masthead { border-bottom: 3px double var(--border); padding: 16px 0 12px; text-align: center; }
.masthead-label { font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--neutral-600); font-weight: 400; line-height: 1; }

/* -- Source Banner -- */
.source-banner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; padding: 8px 16px; margin: 16px 0 0; border-radius: 4px; font-size: 14px; font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; line-height: 1; }
.source-banner.synthetic { background: var(--banner-synthetic-bg); border: 1px solid var(--banner-synthetic-border); }
.source-banner.real { background: var(--banner-real-bg); border: 1px solid var(--banner-real-border); }
.source-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; line-height: 1; }
.source-banner button { padding: 4px 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--white); cursor: pointer; font-size: 12px; font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; line-height: 1; min-height: 44px; min-width: 44px; }
.source-banner button:hover { background: var(--neutral-100); }

/* -- Headline Block -- */
.headline-block { text-align: center; padding: 48px 0 24px; border-bottom: 1px solid var(--border); }
.headline-block h1 { max-width: 680px; margin: 0 auto 16px; }
.headline-block .dek { font-size: 16px; color: var(--neutral-600); max-width: 560px; margin: 0 auto 12px; line-height: 1.6; }
.headline-block .byline { font-size: 12px; color: var(--neutral-600); font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; letter-spacing: 0.5px; line-height: 1; }

/* -- Key Findings -- */
.findings-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); margin: 24px 0; border: 1px solid var(--border); }
.finding-card { background: var(--white); padding: 16px 12px; text-align: center; }
.finding-value { font-size: 24px; font-weight: 700; line-height: 1.1; }
.finding-value.accent { color: var(--accent); }
.finding-label { font-size: 12px; color: var(--neutral-600); margin-top: 4px; font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; text-transform: uppercase; letter-spacing: 1px; line-height: 1; }
.finding-desc { font-size: 12px; color: var(--neutral-400); margin-top: 4px; line-height: 1.5; font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; text-transform: none; letter-spacing: 0; }

/* -- Section -- */
.narrative-section { padding: 32px 0; border-top: 1px solid var(--border-light); }
.narrative-section h2 { margin-bottom: 4px; }
.narrative-section .section-intro { font-size: 14px; color: var(--neutral-600); margin-bottom: 16px; line-height: 1.6; font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; }

/* -- Takeaway annotation (under the surface comparison) -- */
.hero-annotation { font-size: 12px; color: var(--accent); font-style: italic; margin-top: 8px; margin-bottom: 4px; line-height: 1.5; }

/* -- Surface comparison (count vs. per-game small multiples) -- */
.cmp-head { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 12px; }
.cmp-head-spacer { width: 96px; flex-shrink: 0; }
.cmp-metrics { flex: 1; display: flex; gap: 48px; }
.cmp-metric-head { flex: 1; font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--neutral-600); line-height: 1.2; }
.cmp-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.cmp-label { width: 96px; text-align: right; font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; font-size: 12px; font-weight: 600; color: var(--neutral-600); line-height: 1; flex-shrink: 0; }
.cmp-metric { flex: 1; display: flex; align-items: center; gap: 8px; }
.cmp-track { flex: 1; height: 16px; position: relative; }
.cmp-fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 1px; background: var(--neutral-bar); transition: width 0.4s ease; }
.cmp-value { font-family: monospace; font-size: 12px; color: var(--neutral-600); white-space: nowrap; line-height: 1; width: 36px; text-align: right; flex-shrink: 0; }
@media (max-width: 640px) { .cmp-metrics { flex-direction: column; gap: 4px; } .cmp-row { flex-wrap: wrap; } .cmp-head { display: none; } }

/* -- Callout -- */
.callout { margin: 32px 0; padding: 16px 24px; border-left: 4px solid var(--accent); background: var(--accent-bg); }
.callout-number { font-size: 30px; font-weight: 700; color: var(--accent); line-height: 1.1; }
.callout-text { font-size: 14px; color: var(--neutral-900); margin-top: 4px; line-height: 1.6; }

/* -- Injury Type Bars -- */
.injury-surface-group { margin-bottom: 16px; }
.injury-surface-label { font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; line-height: 1; }
.injury-bar-row { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
.injury-bar-label { width: 96px; text-align: right; font-size: 12px; color: var(--neutral-600); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.5; flex-shrink: 0; }
.injury-bar-track { flex: 1; height: 8px; position: relative; }
.injury-bar-fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 1px; }
.injury-bar-value { font-family: monospace; font-size: 12px; font-weight: 600; width: 32px; text-align: right; line-height: 1; white-space: nowrap; flex-shrink: 0; }

/* -- Team Row -- */
.team-row { display: flex; align-items: baseline; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border-light); }
.team-row:nth-child(even) { background: var(--neutral-50); }
.team-rank { font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; font-size: 12px; color: var(--neutral-600); width: 24px; text-align: right; line-height: 1; flex-shrink: 0; }
.team-name { font-size: 14px; font-weight: 700; line-height: 1.2; }
.team-surface-tag { font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; font-size: 12px; margin-left: 8px; line-height: 1; }
.team-surface-tag.accent { color: var(--accent); }
.team-surface-tag.neutral { color: var(--neutral-600); }
.team-league { font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; font-size: 12px; color: var(--neutral-600); line-height: 1; }
.team-count { font-family: monospace; font-size: 14px; font-weight: 700; width: 32px; text-align: right; line-height: 1; flex-shrink: 0; }

/* -- Player Card -- */
.player-entry { padding: 12px 0; border-bottom: 1px solid var(--border-light); }
.player-header { display: flex; align-items: baseline; justify-content: space-between; }
.player-name { font-size: 14px; font-weight: 700; line-height: 1.2; }
.player-team { font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; font-size: 12px; color: var(--neutral-600); margin-left: 8px; line-height: 1; }
.player-count { font-family: monospace; font-size: 18px; font-weight: 700; line-height: 1; }
.player-injuries { margin-top: 4px; }
.player-injury-line { font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; font-size: 12px; color: var(--neutral-600); line-height: 1.6; }
.player-injury-line .accent-bullet { color: var(--accent); font-weight: 600; }
.player-injury-line .severe { color: var(--accent); font-weight: 600; }
.player-more { font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; font-size: 12px; color: var(--neutral-400); line-height: 1.6; }

/* -- Search Input -- */
.search-input { padding: 8px 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; font-family: Georgia, serif; background: var(--white); width: 200px; line-height: 1.5; min-height: 44px; }

/* -- Sticky Filter Bar -- */
.filter-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; padding: 8px 24px; background: var(--white); border-bottom: 1px solid var(--border); box-shadow: 0 1px 4px hsla(30, 10%, 10%, 0.08); font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; transform: translateY(-100%); transition: transform 0.3s ease; }
.filter-bar.visible { transform: translateY(0); }
.filter-bar .filter-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--neutral-600); font-weight: 600; line-height: 1; }
.filter-bar select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; font-family: Georgia, serif; background: var(--white); line-height: 1.5; min-height: 44px; }
.filter-bar .filter-count { font-size: 12px; color: var(--neutral-600); margin-left: auto; line-height: 1; }
.filter-bar .filter-reset { font-size: 12px; color: var(--accent); cursor: pointer; border: none; background: none; text-decoration: underline; padding: 4px; min-height: 44px; min-width: 44px; display: flex; align-items: center; }

/* -- Empty State -- */
.empty-state { text-align: center; padding: 64px 24px; }
.empty-state h3 { margin-bottom: 8px; color: var(--neutral-900); font-size: 18px; }
.empty-state p { font-size: 14px; color: var(--neutral-600); margin-bottom: 16px; line-height: 1.6; }
.empty-state button { padding: 8px 24px; border: 1px solid var(--border); border-radius: 4px; background: var(--white); cursor: pointer; font-size: 14px; font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; line-height: 1; min-height: 44px; }
.empty-state button:hover { background: var(--neutral-100); }

/* -- Footer -- */
.site-footer { border-top: 1px solid var(--border); padding: 24px 0 48px; margin-top: 48px; }
.site-footer h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; margin-bottom: 8px; line-height: 1; }
.site-footer p { font-size: 12px; color: var(--neutral-600); line-height: 1.75; max-width: 680px; }

/* -- Focus -- */
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/* -- Source attribution -- */
.source-attr { font-family: 'Franklin Gothic Medium', 'Helvetica Neue', Arial, sans-serif; font-size: 12px; color: var(--neutral-400); margin-top: 8px; line-height: 1; }
</style>
</head>

// -- Seeded RNG --
function seededRandom(seed) {
  var s = seed;
  return function() {
    s = (s * 16807) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

function generateSyntheticData() {
  var rng = seededRandom(42);
  var injuries = [];
  var id = 0;
  var surfaceWeights = { Grass: 0.30, Turf: 0.38, Hybrid: 0.18, Retractable: 0.14 };
  var contextWeights = { 'Game Field': 0.65, 'Practice Field': 0.35 };
  var severityWeights = { Minor: 0.45, Moderate: 0.35, Severe: 0.20 };

  function weightedPick(weights) {
    var r = rng();
    var cumulative = 0;
    for (var key of Object.keys(weights)) {
      cumulative += weights[key];
      if (r < cumulative) return key;
    }
    return Object.keys(weights).pop();
  }

  for (var league of LEAGUES) {
    var teams = TEAMS_DATA[league.id];
    for (var team of teams) {
      var players = PLAYER_NAMES[league.id][team.name];
      var count = Math.floor(rng() * 14) + 6;
      for (var i = 0; i < count; i++) {
        var player = players[Math.floor(rng() * players.length)];
        var surface = weightedPick(surfaceWeights);
        var context = weightedPick(contextWeights);
        var severity = weightedPick(severityWeights);
        var injuryType = INJURY_TYPES_LIST[Math.floor(rng() * INJURY_TYPES_LIST.length)];
        var month = Math.floor(rng() * 12) + 1;
        var day = Math.floor(rng() * 28) + 1;
        var daysOut = severity === 'Minor' ? Math.floor(rng() * 14) + 1
          : severity === 'Moderate' ? Math.floor(rng() * 42) + 14
          : Math.floor(rng() * 120) + 42;
        injuries.push({
          id: id++, league: league.name, leagueId: league.id,
          team: team.name, teamSurface: team.surface, city: team.city,
          player: player, surface: surface, context: context,
          injuryType: injuryType, severity: severity, daysOut: daysOut,
          date: '2025-' + String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0'),
        });
      }
    }
  }
  return injuries;
}

function getFiltered() {
  var d = state.injuries;
  var f = state.filters;
  if (f.league !== 'all') d = d.filter(function(i) { return i.leagueId === f.league; });
  if (f.team !== 'all') d = d.filter(function(i) { return i.team === f.team; });
  if (f.surface !== 'all') d = d.filter(function(i) { return i.surface === f.surface; });
  if (f.context !== 'all') d = d.filter(function(i) { return i.context === f.context; });
  // Note: player search is handled locally in renderPlayerLog, not here
  return d;
}

function getLeagues() {
  var m = new Map();
  state.injuries.forEach(function(i) { if (!m.has(i.leagueId)) m.set(i.leagueId, { id: i.leagueId, name: i.league }); });
  return Array.from(m.values());
}

function getSurfaces() {
  return Array.from(new Set(state.injuries.map(function(i) { return i.surface; }))).filter(Boolean).sort();
}

function getTeams() {
  var pool = state.injuries;
  if (state.filters.league !== 'all') pool = pool.filter(function(i) { return i.leagueId === state.filters.league; });
  return Array.from(new Set(pool.map(function(i) { return i.team; }))).sort();
}

function aggregate(data, key) {
  var m = {};
  data.forEach(function(i) { m[i[key]] = (m[i[key]] || 0) + 1; });
  return Object.entries(m).map(function(e) { return { label: e[0], count: e[1] }; }).sort(function(a, b) { return b.count - a.count; });
}

function getWorstSurface(data) {
  var counts = aggregate(data, 'surface');
  return counts.length > 0 ? counts[0].label : 'Unknown';
}

var LOWER_BODY_KEYWORDS = ['knee', 'hamstring', 'ankle', 'calf', 'thigh', 'groin', 'leg', 'achilles', 'hip', 'foot', 'muscle', 'cruciate', 'acl', 'quad', 'shin', 'metatarsal'];

function isLowerBodyInjury(type) {
  var lower = type.toLowerCase();
  return LOWER_BODY_KEYWORDS.some(function(kw) { return lower.indexOf(kw) !== -1; });
}

// Generic placeholder labels carry no real detail — shown but de-emphasized.
var UNSPECIFIED_TYPE = 'Unspecified';

// Map the source's 128 raw, inconsistent injury labels into a clean category set.
// Returns null for illnesses/medical conditions (excluded from injury views).
function normalizeInjuryType(raw) {
  var t = (raw || '').toLowerCase().trim();
  if (!t) return UNSPECIFIED_TYPE;

  // Illnesses / medical conditions — not injuries, drop them.
  if (/illness|health problem|stomach|heart|appendic|disorder|doping|convalescence|inflammation/.test(t)) return null;

  // Junk placeholders — no usable detail.
  if (/^injur(y|ed)$|doubtful|unknown|knock|^other$|^surgery$|operation|overload/.test(t)) return UNSPECIFIED_TYPE;

  // Specific categories — order matters: bone/joint terms before muscle terms.
  if (/cruciate|jumpers knee|\bknee\b|patell|ligament/.test(t)) return 'Knee Injury';
  if (/ankle/.test(t)) return 'Ankle Injury';
  if (/achilles/.test(t)) return 'Achilles Injury';
  if (/calfbone|shinbone|shin|fibula|tibia|broken leg|\bleg\b/.test(t)) return 'Leg Injury';
  if (/metatarsal|navicular|\bfoot\b|\btoe\b|heel/.test(t)) return 'Foot Injury';
  // Muscle parent: thigh / hamstring / calf / groin / adductor / quad all roll up here.
  if (/muscle|muscular|hamstring|thigh|\bcalf\b|groin|adductor|abductor|quad|pubalgia|contracture|abdominal|hip flexor|flexor|tendon/.test(t)) return 'Muscle Injury';
  if (/pelvis|\bhip\b/.test(t)) return 'Hip Injury';
  if (/collarbone|clavicle|shoulder/.test(t)) return 'Shoulder Injury';
  if (/concussion|\bhead\b|face|eye|nose|tooth|\bneck\b|jaw|cheek/.test(t)) return 'Head/Neck Injury';
  if (/\brib\b|ribs|chest|hernia/.test(t)) return 'Rib/Chest Injury';
  if (/elbow|forearm|\barm\b|wrist|wirst|\bhand\b|finger|metacarpal/.test(t)) return 'Arm/Hand Injury';
  if (/\bback\b/.test(t)) return 'Back Injury';
  if (/lower-body|lower body/.test(t)) return 'Lower-Body';
  if (/upper-body|upper body/.test(t)) return 'Upper-Body';
  if (/wound|contusion|bruise|cut/.test(t)) return 'Bruise/Wound';

  return raw; // unmatched: keep the original label
}

// -- File Loading --
// Shared mapper: normalize raw labels into clean categories and drop illnesses.
function mapInjuryRecords(arr) {
  return arr.map(function(x, i) {
    var normType = normalizeInjuryType(x.injuryType || x.injury_type || x.injury_reason || '');
    if (normType === null) return null; // illness/medical condition — exclude
    return {
      id: x.id != null ? x.id : i, player: x.player || 'Unknown', team: x.team || 'Unknown',
      league: x.league || 'Unknown', leagueId: x.leagueId || x.league_id || 'unknown',
      surface: x.surface || 'Unknown', teamSurface: x.teamSurface || x.team_surface || x.surface || 'Unknown',
      context: x.context || x.field_context || 'Game Field',
      injuryType: normType,
      severity: x.severity || 'Unknown', daysOut: x.daysOut || x.days_out || 0,
      date: x.date || '', city: x.city || '',
      homeAway: x.homeAway || '', opponentTeam: x.opponentTeam || '',
    };
  }).filter(Boolean);
}

function loadJSON(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var j = JSON.parse(e.target.result);
      var arr = j.injuries || j;
      if (Array.isArray(arr) && arr.length > 0) {
        state.injuries = mapInjuryRecords(arr);
        state.source = 'real - ' + (j.metadata && j.metadata.source ? j.metadata.source : file.name);
        state.gamesBySurface = (j.metadata && j.metadata.games_by_surface) ? j.metadata.games_by_surface : null;
        state.filters = { league: 'all', team: 'all', surface: 'all', context: 'all', search: '' };
        render();
      } else {
        alert('JSON must contain an "injuries" array with at least one record.');
      }
    } catch (err) {
      alert('Parse error: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// Auto-load data bundled alongside the page (used by the deployed build).
function loadFromURL(url) {
  fetch(url).then(function(resp) {
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return resp.json();
  }).then(function(j) {
    var arr = j.injuries || j;
    if (Array.isArray(arr) && arr.length > 0) {
      state.injuries = mapInjuryRecords(arr);
      state.source = (j.metadata && j.metadata.source) ? j.metadata.source : 'API-Football (api-sports.io)';
      state.gamesBySurface = (j.metadata && j.metadata.games_by_surface) ? j.metadata.games_by_surface : null;
      state.filters = { league: 'all', team: 'all', surface: 'all', context: 'all', search: '' };
    }
    render();
  }).catch(function() {
    render();
  });
}

function resetData() {
  state.injuries = generateSyntheticData();
  state.source = 'synthetic';
  state.gamesBySurface = null;
  state.filters = { league: 'all', team: 'all', surface: 'all', context: 'all', search: '' };
  render();
}

// -- Rendering Helpers --
function el(tag, attrs) {
  var e = document.createElement(tag);
  if (attrs) {
    for (var k of Object.keys(attrs)) {
      if (k === 'style' && typeof attrs[k] === 'object') {
        Object.assign(e.style, attrs[k]);
      } else if (k.startsWith('on')) {
        e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
      } else if (k === 'className') {
        e.className = attrs[k];
      } else {
        e.setAttribute(k, attrs[k]);
      }
    }
  }
  // remaining arguments are children
  for (var i = 2; i < arguments.length; i++) {
    var c = arguments[i];
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  }
  return e;
}

  renderSurfaceComparison(main, filtered);
  renderCallout(main, filtered);
  renderInjuryTypes(main, filtered, surfaces);
  renderTeamRankings(main, filtered);
  renderPlayerLog(main, filtered);

  main.appendChild(renderFooter());
  setupScrollObserver();
}

function renderFooter() {
  var footer = el('footer', { className: 'site-footer' });
  footer.appendChild(el('h3', null, 'About This Data'));
  var text = state.source === 'synthetic'
    ? 'Currently showing synthetic data (' + state.injuries.length.toLocaleString() + ' simulated injuries). To use real data: 1) Sign up at dashboard.api-football.com. 2) Run the Python pipeline script with your API key. 3) Click "Load JSON" above to import the output file.'
    : 'Real data from ' + state.source + '. ' + state.injuries.length.toLocaleString() + ' records across ' + getLeagues().length + ' leagues. Surface types from DBpedia and manual research. Severity assigned heuristically from injury descriptions. Recovery duration (days out) is not available in the source data, so time-lost is not reported. Surface comparisons should be read per game played, not by raw count.';
  footer.appendChild(el('p', null, text));
  return footer;
}

function setupScrollObserver() {
  var bar = document.getElementById('filter-bar');
  var target = document.getElementById('headline');
  if (!bar || !target) return;
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        bar.classList.remove('visible');
      } else {
        bar.classList.add('visible');
      }
    });
  }, { threshold: 0 });
  observer.observe(target);
}

function renderSurfaceComparison(container, filtered) {
  var section = el('section', { className: 'narrative-section' });
  section.setAttribute('role', 'img');
  section.setAttribute('aria-label', 'Injuries by surface: total count versus injuries per game, side by side');
  section.appendChild(el('h2', null, 'Total Injuries vs. Injuries per Game'));

  var counts = aggregate(filtered, 'surface'); // sorted desc by count
  if (counts.length === 0) { return; }
  var games = state.gamesBySurface;

  var rows = counts.map(function(c) {
    var g = games ? (games[c.label] || 0) : 0;
    return { surface: c.label, count: c.count, games: g, rate: g > 0 ? c.count / g : null };
  });
  var maxCount = rows[0].count || 1;
  var maxRate = rows.reduce(function(m, r) { return (r.rate != null && r.rate > m) ? r.rate : m; }, 0) || 1;
  var hasRate = rows.some(function(r) { return r.rate != null; });

  if (!hasRate) {
    section.appendChild(el('div', { className: 'section-intro' }, 'Raw injury totals across all leagues. Load real data with games-played metadata to see the exposure-adjusted per-game rate alongside.'));
    rows.forEach(function(r) {
      var row = el('div', { className: 'cmp-row' });
      row.appendChild(el('div', { className: 'cmp-label' }, r.surface));
      var metric = el('div', { className: 'cmp-metric' });
      var track = el('div', { className: 'cmp-track' });
      track.appendChild(el('div', { className: 'cmp-fill', style: { width: ((r.count / maxCount) * 100) + '%' } }));
      metric.appendChild(track);
      metric.appendChild(el('div', { className: 'cmp-value' }, String(r.count)));
      row.appendChild(metric);
      section.appendChild(row);
    });
    container.appendChild(section);
    return;
  }

  section.appendChild(el('div', { className: 'section-intro' }, 'Same data, two questions — shown side by side so they can be read together. By raw total, hybrid pitches lead; but that mostly reflects how many games each surface hosts. Divide by games played and the order changes. Each surface stays on the same row, so you can see the two metrics disagree.'));

  var head = el('div', { className: 'cmp-head' });
  head.appendChild(el('div', { className: 'cmp-head-spacer' }));
  var heads = el('div', { className: 'cmp-metrics' });
  heads.appendChild(el('div', { className: 'cmp-metric-head' }, 'Total injuries'));
  heads.appendChild(el('div', { className: 'cmp-metric-head' }, 'Per game played'));
  head.appendChild(heads);
  section.appendChild(head);

  rows.forEach(function(r) {
    var row = el('div', { className: 'cmp-row' });
    row.appendChild(el('div', { className: 'cmp-label' }, r.surface));
    var metrics = el('div', { className: 'cmp-metrics' });

    var m1 = el('div', { className: 'cmp-metric' });
    var t1 = el('div', { className: 'cmp-track' });
    t1.appendChild(el('div', { className: 'cmp-fill', style: { width: ((r.count / maxCount) * 100) + '%' } }));
    m1.appendChild(t1);
    m1.appendChild(el('div', { className: 'cmp-value' }, r.count.toLocaleString()));
    metrics.appendChild(m1);

    var m2 = el('div', { className: 'cmp-metric' });
    var t2 = el('div', { className: 'cmp-track' });
    if (r.rate != null) t2.appendChild(el('div', { className: 'cmp-fill', style: { width: ((r.rate / maxRate) * 100) + '%' } }));
    m2.appendChild(t2);
    m2.appendChild(el('div', { className: 'cmp-value' }, r.rate != null ? r.rate.toFixed(2) : 'n/a'));
    metrics.appendChild(m2);

    row.appendChild(metrics);
    section.appendChild(row);
  });

  var topCount = rows[0].surface;
  var topRate = rows.slice().sort(function(a, b) { return (b.rate || 0) - (a.rate || 0); })[0].surface;
  if (topCount !== topRate) {
    section.appendChild(el('div', { className: 'hero-annotation', style: { marginLeft: '0' } },
      topCount + ' has the most injuries overall, but ' + topRate.toLowerCase() + ' has the most per game played — total and rate point to different surfaces.'));
  }

  var denoms = rows.filter(function(r) { return r.games > 0; }).map(function(r) { return r.surface + ' ' + r.count.toLocaleString() + '/' + r.games.toLocaleString(); }).join(' · ');
  section.appendChild(el('div', { className: 'source-attr' }, 'Per game = injuries ÷ games played (' + denoms + '). Surfaces hosting few games — e.g. grass — have small denominators, so their rates are less certain.'));
  container.appendChild(section);
}

function renderCallout(container, filtered) {
  var total = filtered.length;
  if (total === 0) return;
  function share(type) { return Math.round(filtered.filter(function(i) { return i.injuryType === type; }).length / total * 100); }
  var callout = el('div', { className: 'callout' });
  callout.appendChild(el('div', { className: 'callout-number' }, 'Same mix'));
  callout.appendChild(el('div', { className: 'callout-text' }, 'The breakdown of injuries barely changes by surface — muscle ≈' + share('Muscle Injury') + '%, knee ≈' + share('Knee Injury') + '%, ankle ≈' + share('Ankle Injury') + '% on grass, hybrid, turf and retractable fields alike. No injury type is meaningfully tied to a particular surface; field type tracks how many injuries are recorded, not which injuries occur.'));
  container.appendChild(callout);
}

function renderInjuryTypes(container, filtered, surfaces) {
  var section = el('section', { className: 'narrative-section' });
  section.setAttribute('role', 'img');
  section.setAttribute('aria-label', 'Injury type mix as a share of each surface');
  section.appendChild(el('h2', null, 'Injury Mix by Surface'));

  section.appendChild(el('div', { className: 'section-intro' }, 'Each injury type as a share of that surface’s own injuries — so volume differences are removed. The same types in the same order appear for every surface: the bars line up, showing the mix barely changes by field.'));

  // Shared category set + order: the most common injury types across all surfaces.
  var overall = {};
  filtered.forEach(function(i) { overall[i.injuryType] = (overall[i.injuryType] || 0) + 1; });
  var topTypes = Object.entries(overall).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 6).map(function(e) { return e[0]; });

  // Per-surface share (% of that surface) for each shared type; common % scale across all.
  var surfStats = {};
  var maxPct = 0;
  surfaces.forEach(function(s) {
    var si = filtered.filter(function(i) { return i.surface === s; });
    if (si.length === 0) return;
    surfStats[s] = { total: si.length, pct: {} };
    topTypes.forEach(function(t) {
      var c = si.filter(function(i) { return i.injuryType === t; }).length;
      var pct = c / si.length * 100;
      surfStats[s].pct[t] = pct;
      if (pct > maxPct) maxPct = pct;
    });
  });
  if (maxPct === 0) maxPct = 1;

  surfaces.forEach(function(s) {
    if (!surfStats[s]) return;
    var stat = surfStats[s];
    var group = el('div', { className: 'injury-surface-group' });
    group.appendChild(el('div', { className: 'injury-surface-label', style: { color: 'var(--neutral-600)' } },
      s + ' — ' + stat.total.toLocaleString() + ' injuries'));

    topTypes.forEach(function(type) {
      var pct = stat.pct[type] || 0;
      var isVague = (type === UNSPECIFIED_TYPE);
      var row = el('div', { className: 'injury-bar-row' });
      row.appendChild(el('div', { className: 'injury-bar-label', style: isVague ? { color: 'var(--neutral-600)', fontStyle: 'italic' } : null }, type));
      var track = el('div', { className: 'injury-bar-track' });
      var fillColor = isVague ? 'var(--neutral-bar-light)' : 'var(--neutral-bar)';
      track.appendChild(el('div', { className: 'injury-bar-fill', style: { width: ((pct / maxPct) * 100) + '%', background: fillColor } }));
      row.appendChild(track);
      row.appendChild(el('div', { className: 'injury-bar-value', style: isVague ? { color: 'var(--neutral-600)' } : null }, Math.round(pct) + '%'));
      group.appendChild(row);
    });

    section.appendChild(group);
  });

  section.appendChild(el('div', { className: 'source-attr' }, 'Each bar = that injury type’s share of the surface’s injuries. Common scale across surfaces.'));
  container.appendChild(section);
}
function renderTeamRankings(container, filtered) {
  var section = el('section', { className: 'narrative-section' });
  section.appendChild(el('h2', null, 'Most Injured Teams'));
  section.appendChild(el('div', { className: 'section-intro' }, 'Top 20 by total injury count.'));

  var teamMap = {};
  filtered.forEach(function(i) {
    if (!teamMap[i.team]) teamMap[i.team] = { team: i.team, league: i.league, count: 0, surface: i.teamSurface };
    teamMap[i.team].count++;
  });
  var sorted = Object.values(teamMap).sort(function(a, b) { return b.count - a.count; });

  // Highlight the surface of the #1 team
  var topTeamSurface = sorted.length > 0 ? sorted[0].surface : '';

  sorted.slice(0, 20).forEach(function(t, i) {
    var row = el('div', { className: 'team-row' });
    row.appendChild(el('div', { className: 'team-rank' }, String(i + 1)));

    var nameWrap = el('div', { style: { flex: '1' } });
    var nameSpan = el('span', { className: 'team-name' }, t.team);
    nameWrap.appendChild(nameSpan);

    var isTop = (t.surface === topTeamSurface);
    var tag = el('span', { className: 'team-surface-tag ' + (isTop ? 'accent' : 'neutral') });
    if (isTop) {
      tag.appendChild(document.createTextNode('\u25cf '));
    }
    tag.appendChild(document.createTextNode(t.surface));
    nameWrap.appendChild(tag);
    row.appendChild(nameWrap);

    row.appendChild(el('div', { className: 'team-league' }, t.league));
    row.appendChild(el('div', { className: 'team-count' }, String(t.count)));
    section.appendChild(row);
  });

  section.appendChild(el('div', { className: 'source-attr' }, 'Source: API-Football (api-sports.io)'));
  container.appendChild(section);
}
function buildPlayerList(listWrap, filtered, searchTerm) {
  while (listWrap.firstChild) listWrap.removeChild(listWrap.firstChild);

  var topSurface = getWorstSurface(filtered);

  // Filter by search
  var searchFiltered = filtered;
  if (searchTerm) {
    var lower = searchTerm.toLowerCase();
    searchFiltered = filtered.filter(function(i) { return i.player.toLowerCase().includes(lower); });
  }

  var playerMap = {};
  searchFiltered.forEach(function(i) {
    var k = i.player + '|' + i.team;
    if (!playerMap[k]) playerMap[k] = { player: i.player, team: i.team, league: i.league, count: 0, injuries: [] };
    playerMap[k].count++;
    playerMap[k].injuries.push(i);
  });
  var sorted = Object.values(playerMap).sort(function(a, b) { return b.count - a.count; });

  if (sorted.length === 0) {
    var empty = el('div', { style: { padding: '24px 0', color: 'var(--neutral-600)', fontSize: '14px' } }, 'No players match "' + searchTerm + '"');
    listWrap.appendChild(empty);
    return;
  }

  sorted.slice(0, 30).forEach(function(p) {
    var entry = el('div', { className: 'player-entry' });

    var header = el('div', { className: 'player-header' });
    var left = el('div');
    left.appendChild(el('span', { className: 'player-name' }, p.player));
    left.appendChild(el('span', { className: 'player-team' }, p.team + ' \u00b7 ' + p.league));
    header.appendChild(left);
    header.appendChild(el('div', { className: 'player-count' }, String(p.count)));
    entry.appendChild(header);

    var injDiv = el('div', { className: 'player-injuries' });
    var maxShow = 3;
    p.injuries.slice(0, maxShow).forEach(function(x) {
      var line = el('div', { className: 'player-injury-line' });

      var isWorstSurface = (x.surface === topSurface);
      var bullet = el('span', { className: isWorstSurface ? 'accent-bullet' : '' }, '\u25cf ');
      if (!isWorstSurface) bullet.style.color = 'var(--neutral-400)';
      line.appendChild(bullet);

      var text = x.injuryType + ' \u2014 ' + x.surface + ', ' + x.context + ' \u2014 ';
      line.appendChild(document.createTextNode(text));

      if (x.severity === 'Severe') {
        line.appendChild(el('span', { className: 'severe' }, 'Severe'));
      } else {
        line.appendChild(document.createTextNode(x.severity));
      }

      if (x.daysOut > 0) line.appendChild(document.createTextNode(', ' + x.daysOut + 'd'));
      if (x.date) line.appendChild(document.createTextNode(' \u00b7 ' + x.date));
      injDiv.appendChild(line);
    });

    if (p.injuries.length > maxShow) {
      injDiv.appendChild(el('div', { className: 'player-more' }, '... ' + (p.injuries.length - maxShow) + ' more'));
    }

    entry.appendChild(injDiv);
    listWrap.appendChild(entry);
  });
}

function renderPlayerLog(container, filtered) {
  var section = el('section', { className: 'narrative-section' });
  section.appendChild(el('h2', null, 'Player Injury Log'));
  section.appendChild(el('div', { className: 'section-intro' }, 'Players with the most injuries.'));

  var listWrap = el('div', { style: { marginTop: '16px' } });

  var searchInput = el('input', { className: 'search-input', type: 'text', placeholder: 'Search player\u2026', 'aria-label': 'Search players by name' });
  searchInput.value = state.filters.search;
  // Only rebuild the player list, not the whole page
  searchInput.addEventListener('input', function(e) {
    state.filters.search = e.target.value;
    buildPlayerList(listWrap, filtered, e.target.value);
  });
  section.appendChild(searchInput);

  buildPlayerList(listWrap, filtered, state.filters.search);

  section.appendChild(listWrap);
  section.appendChild(el('div', { className: 'source-attr' }, 'Source: API-Football (api-sports.io)'));
  container.appendChild(section);
}

// -- Initialize --
render();
loadFromURL('data.json');
</script>
</body>
</html>
